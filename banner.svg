<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 350" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap');

      .bg-dark { fill: #0a0705; }
      
      .title { font-family: 'Inter', sans-serif; font-size: 64px; font-weight: 900; fill: #F1E3C4; letter-spacing: 4px; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 700; fill: #EEA834; letter-spacing: 2px; text-transform: uppercase; }
      .desc { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 400; fill: #7EBEB0; letter-spacing: 1px; }

      .flow-line { fill: none; stroke-width: 3px; stroke-linecap: round; }
      .flow-teal { stroke: #7EBEB0; }
      .flow-orange { stroke: #F07823; stroke-width: 5px; }
      .flow-yellow { stroke: #EEA834; stroke-width: 2px; }

      /* Animasi Cendrawasih Flow */
      .anim-flow {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: dash 4s ease-in-out infinite alternate;
      }

      @keyframes dash {
        0% { stroke-dashoffset: 1000; }
        100% { stroke-dashoffset: 0; }
      }

      /* Animasi Fade Text */
      .anim-fade {
        animation: fade 3s ease-in-out infinite alternate;
      }

      @keyframes fade {
        0% { opacity: 0.8; }
        100% { opacity: 1; }
      }
    </style>

    <!-- Pola Noken -->
    <pattern id="noken-bg" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 30 L30 60 L0 30 Z" fill="none" stroke="#5A3F30" stroke-width="2" opacity="0.4" />
      <path d="M30 15 L45 30 L30 45 L15 30 Z" fill="none" stroke="#F07823" stroke-width="1" opacity="0.2" />
      <line x1="0" y1="30" x2="60" y2="30" stroke="#7EBEB0" stroke-width="0.5" opacity="0.1" />
      <line x1="30" y1="0" x2="30" y2="60" stroke="#7EBEB0" stroke-width="0.5" opacity="0.1" />
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Latar Belakang -->
  <rect width="100%" height="100%" class="bg-dark" />
  <rect width="100%" height="100%" fill="url(#noken-bg)" />

  <!-- Ornamen Cendrawasih (Garis Mengalir) -->
  <g filter="url(#glow)" opacity="0.6">
    <path class="flow-line flow-orange anim-flow" d="M 0,300 C 300,350 400,100 700,150 C 900,180 1100,50 1200,80" />
    <path class="flow-line flow-teal anim-flow" d="M 0,320 C 350,380 450,150 750,200 C 950,230 1150,100 1200,130" style="animation-delay: 0.5s;" />
    <path class="flow-line flow-yellow anim-flow" d="M 0,280 C 250,320 350,80 650,130 C 850,160 1050,30 1200,60" style="animation-delay: 1s;" />
  </g>

  <!-- Area Logo -->
  <!-- Pastikan file LOGO-Nokara-Core.png berada di direktori yang sama atau gunakan URL absolut -->
  <image href="LOGO-Nokara-Core.png" x="80" y="50" width="250" height="250" />

  <!-- Tipografi -->
  <g transform="translate(380, 150)">
    <text x="0" y="0" class="title anim-fade">NOKARA CORE</text>
    <text x="5" y="45" class="subtitle">Lahir Dari Papua Untuk Indonesia</text>
    <text x="5" y="85" class="desc">Membangun ekosistem digital terintegrasi melalui</text>
    <text x="5" y="110" class="desc">teknologi yang sederhana, terpercaya, dan berdampak nyata.</text>
  </g>

  <!-- Aksen Geometris Kanan -->
  <polygon points="1050,250 1100,300 1050,350 1000,300" fill="none" stroke="#F07823" stroke-width="2" opacity="0.5" />
  <polygon points="1120,50 1150,80 1120,110 1090,80" fill="none" stroke="#7EBEB0" stroke-width="2" opacity="0.5" />
</svg>
